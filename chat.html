<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
    .chat-box { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; display: flex; flex-direction: column; height: 80vh; }
    .header { background: #1a1a1a; color: white; padding: 16px 20px; border-radius: 16px 16px 0 0; }
    .header h1 { font-size: 1rem; }
    .header p { font-size: 0.75rem; opacity: 0.6; margin-top: 2px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 8px; }
    .msg.user { flex-direction: row-reverse; }
    .bubble { padding: 10px 14px; border-radius: 16px; font-size: 0.875rem; line-height: 1.5; max-width: 80%; }
    .msg.bot .bubble { background: #f0f0f0; color: #1a1a1a; border-top-left-radius: 4px; }
    .msg.user .bubble { background: #1a1a1a; color: white; border-top-right-radius: 4px; }
    .input-row { display: flex; gap: 10px; padding: 16px; border-top: 1px solid #eee; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.875rem; outline: none; }
    input:focus { border-color: #1a1a1a; }
    button { background: #1a1a1a; color: white; border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer; font-size: 0.875rem; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .success { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 12px; padding: 14px; font-size: 0.8rem; }
    .success h3 { color: #2e7d32; margin-bottom: 8px; }
    .field { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #c8e6c9; }
    .field:last-child { border: none; }
    .label { color: #666; }
  </style>
</head>
<body>
<div class="chat-box">
  <div class="header">
    <h1>Support Assistant</h1>
    <p>We're here to help</p>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-row">
    <input id="input" placeholder="Type your message..." />
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>
<script>
  const API = "PASTE_YOUR_RAILWAY_URL_HERE";
  let sessionId = null;

  function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = 9999;
  }

  function showSuccess(data) {
    const div = document.createElement("div");
    div.className = "success";
    div.innerHTML = `<h3>✓ Enquiry Submitted</h3>
      ${[["Name",data.name],["Email",data.email],["Order",data.order_number],["Type",data.enquiry_type],["Details",data.description]]
      .map(([l,v])=>`<div class="field"><span class="label">${l}</span><span>${v}</span></div>`).join("")}`;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = 9999;
  }

  async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, "user");
    input.value = "";
    document.getElementById("sendBtn").disabled = true;
    const res = await fetch(`${API}/enquiry/message`, {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ sessionId, message: text })
    });
    const data = await res.json();
    addMessage(data.message, "bot");
    if (data.complete) { showSuccess(data.customerData); input.disabled = true; return; }
    document.getElementById("sendBtn").disabled = false;
    input.focus();
  }

  document.getElementById("input").addEventListener("keydown", e => { if (e.key === "Enter") send(); });

  fetch(`${API}/enquiry/start`, { method: "POST" })
    .then(r => r.json()).then(d => { sessionId = d.sessionId; addMessage(d.message, "bot"); });
</script>
</body>
</html>
